name: Build Kestrel Arch ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-archiso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies (Including Rust)
        run: |
          echo 'Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch' > /etc/pacman.d/mirrorlist
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Su --noconfirm
          pacman -S --noconfirm archiso wget gawk mtools dosfstools erofs-utils squashfs-tools pacman-contrib rustup base-devel cmake pkgconf freetype2 fontconfig libx11
          
          rustup default stable

      - name: Prepare Offline Package Cache & Dependencies
        run: |
          mkdir -p airootfs/opt/offline_cache
          mkdir -p /tmp/empty_db/local
          
          pacman-key --init
          pacman-key --recv-key 3056513887B78AEB --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key 3056513887B78AEB
          pacman -U 'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-keyring.pkg.tar.zst' 'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-mirrorlist.pkg.tar.zst' --noconfirm
          echo -e "\n[chaotic-aur]\nInclude = /etc/pacman.d/chaotic-mirrorlist" >> /etc/pacman.conf

          # Base Deployment Engine Packages + 4 Deployed Boot Managers + 3 Main Offline Desktops
          pacman -Syw --cachedir airootfs/opt/offline_cache --dbpath /tmp/empty_db --noconfirm \
            base linux-cachyos linux-cachyos-headers linux-firmware scx-scheds efibootmgr os-prober ntfs-3g networkmanager iwd bluez bluez-utils blueman \
            pipewire pipewire-pulse wireplumber brightnessctl flatpak xorg-server sddm sudo zram-generator earlyoom \
            reflector ttf-dejavu ttf-liberation noto-fonts noto-fonts-emoji curl chaotic-keyring chaotic-mirrorlist parted \
            amd-ucode intel-ucode nvidia nvidia-utils nvidia-prime xf86-video-amdgpu intel-media-driver \
            grub refind limine \
            hyprland waybar kitty foot rofi-wayland xdg-desktop-portal-hyprland polkit-kde-agent thunar gvfs \
            plasma-desktop plasma-workspace plasma-nm power-profiles-daemon kscreen konsole dolphin ark kate spectacle discover packagekit-qt6 sddm-kcm \
            xfce4 xfce4-terminal xfce4-goodies \
            zen-browser-bin qt5-wayland qt6-wayland git stow cage mesa polkit

      - name: Index Offline Database
        run: |
          cd airootfs/opt/offline_cache
          repo-add kestrel-offline.db.tar.gz *.pkg.tar.zst

      - name: Build Kestrel GUI
        run: |
          cd airootfs/gui-src
          cargo build --release

      - name: Build the ISO
        run: |
          cp -r /usr/share/archiso/configs/releng /tmp/kestrel_profile
          echo -e "\n[chaotic-aur]\nSigLevel = Optional TrustAll\nInclude = /etc/pacman.d/chaotic-mirrorlist" >> /tmp/kestrel_profile/pacman.conf
          
          echo -e "zsh\ncage\nkitty\nmesa\nttf-dejavu\npolkit\npciutils" >> /tmp/kestrel_profile/packages.x86_64

          mkdir -p /tmp/kestrel_profile/airootfs/usr/local/bin
          mkdir -p /tmp/kestrel_profile/airootfs/root
          
          sed 's/\r$//' airootfs/usr/local/bin/install.sh > /tmp/kestrel_profile/airootfs/usr/local/bin/install.sh
          
          cp airootfs/gui-src/target/release/kestrel-gui /tmp/kestrel_profile/airootfs/usr/local/bin/kestrel-gui
          
          chmod +x /tmp/kestrel_profile/airootfs/usr/local/bin/install.sh
          chmod +x /tmp/kestrel_profile/airootfs/usr/local/bin/kestrel-gui

          cat << 'EOF' > /tmp/kestrel_profile/airootfs/root/.zlogin
          export XDG_RUNTIME_DIR=/run/user/$(id -u)
          
          # Smart Detection: Evaluate environment to prevent Wayland crashes
          IS_VM=$(systemd-detect-virt -q && echo 1 || echo 0)
          HAS_NVIDIA=$(lspci | grep -iE "vga.*nvidia|3d.*nvidia" >/dev/null 2>&1 && echo 1 || echo 0)

          if [ "$IS_VM" = "1" ] || [ "$HAS_NVIDIA" = "1" ]; then
              export WLR_NO_HARDWARE_CURSORS=1
              export WLR_RENDERER=pixman
          fi
          
          if [ "$(tty)" = "/dev/tty1" ]; then
              exec cage -s -- /usr/local/bin/kestrel-gui
          fi
          EOF

          mkdir -p /tmp/kestrel_profile/airootfs/opt
          cp -r airootfs/opt/offline_cache /tmp/kestrel_profile/airootfs/opt/

          mkdir -p out/
          mkarchiso -v -w /tmp/archiso-tmp -o out/ /tmp/kestrel_profile/

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kestrel-Arch-ISO
          path: out/*.iso
