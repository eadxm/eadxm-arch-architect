name: Build Kestrel Arch ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-archiso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          echo 'Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch' > /etc/pacman.d/mirrorlist
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Su --noconfirm
          pacman -S --noconfirm archiso wget gawk mtools dosfstools erofs-utils squashfs-tools pacman-contrib

      - name: Prepare Offline Package Cache & Dependencies
        run: |
          mkdir -p airootfs/opt/offline_cache
          mkdir -p /tmp/empty_db/local
          
          pacman-key --init
          pacman-key --recv-key 3056513887B78AEB --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key 3056513887B78AEB
          pacman -U 'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-keyring.pkg.tar.zst' 'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-mirrorlist.pkg.tar.zst' --noconfirm
          echo -e "\n[chaotic-aur]\nInclude = /etc/pacman.d/chaotic-mirrorlist" >> /etc/pacman.conf

          pacman -Syw --cachedir airootfs/opt/offline_cache --dbpath /tmp/empty_db --noconfirm \
            base linux linux-firmware grub efibootmgr os-prober ntfs-3g networkmanager iwd bluez bluez-utils blueman \
            pipewire pipewire-pulse wireplumber brightnessctl flatpak xorg-server sddm sudo zram-generator earlyoom \
            reflector ttf-dejavu ttf-liberation noto-fonts noto-fonts-emoji curl chaotic-keyring chaotic-mirrorlist parted \
            amd-ucode intel-ucode nvidia nvidia-utils xf86-video-amdgpu intel-media-driver switcheroo-control \
            hyprland waybar kitty foot rofi-wayland xdg-desktop-portal-hyprland polkit-kde-agent thunar gvfs \
            plasma-desktop plasma-workspace plasma-nm power-profiles-daemon kscreen konsole dolphin ark kate spectacle discover packagekit-qt6 sddm-kcm \
            xfce4 xfce4-terminal xfce4-goodies \
            zen-browser-bin libreoffice-fresh qt5-wayland qt6-wayland zenity git stow

      - name: Index Offline Database
        run: |
          cd airootfs/opt/offline_cache
          repo-add eadxm-offline.db.tar.gz *.pkg.tar.zst

      - name: Build the ISO
        run: |
          cp -r /usr/share/archiso/configs/releng /tmp/kestrel_profile
          echo -e "\n[chaotic-aur]\nSigLevel = Optional TrustAll\nInclude = /etc/pacman.d/chaotic-mirrorlist" >> /tmp/kestrel_profile/pacman.conf
          echo "zsh" >> /tmp/kestrel_profile/packages.x86_64

          # 1. Setup the installer
          mkdir -p /tmp/kestrel_profile/airootfs/root
          sed 's/\r$//' airootfs/usr/local/bin/install.sh > /tmp/kestrel_profile/airootfs/root/install.sh
          chmod +x /tmp/kestrel_profile/airootfs/root/install.sh
          echo "/root/install.sh" >> /tmp/kestrel_profile/airootfs/root/.zlogin

          # 2. Inject the Universal First-Boot Dotfile App
          mkdir -p /tmp/kestrel_profile/airootfs/usr/local/bin
          cat << 'EOF' > /tmp/kestrel_profile/airootfs/usr/local/bin/kestrel-welcome.sh
          #!/bin/bash
          sleep 2
          CHOICE=$(zenity --list --title="Kestrel Arch Setup" --text="Choose your System Profile:" --radiolist --column="Select" --column="Profile" TRUE "Basic (No Customization)" FALSE "Low-End PC (Optimized UI)" FALSE "High-End PC (Calaestia Theme)")
          
          if [ "$XDG_CURRENT_DESKTOP" = "Hyprland" ]; then DE_DIR="hyprland"
          elif [ "$XDG_CURRENT_DESKTOP" = "KDE" ]; then DE_DIR="kde"
          else DE_DIR="xfce"; fi
          
          case "$CHOICE" in
              "Basic"*) DOT_PATH="/opt/dotfiles/basic/$DE_DIR" ;;
              "Low-End"*) DOT_PATH="/opt/dotfiles/lowend/$DE_DIR" ;;
              "High-End"*) DOT_PATH="/opt/dotfiles/highend/$DE_DIR" ;;
          esac
          
          if [ -d "$DOT_PATH" ]; then cp -rT "$DOT_PATH" ~/.config/; fi
          
          rm -f ~/.config/autostart/kestrel-welcome.desktop
          sed -i '/kestrel-welcome.sh/d' ~/.config/hypr/hyprland.conf
          zenity --info --text="Profile applied! Logging out to apply changes..."
          loginctl terminate-user $USER
          EOF
          chmod +x /tmp/kestrel_profile/airootfs/usr/local/bin/kestrel-welcome.sh

          # 3. Setup Desktop Autostart Hooks
          mkdir -p /tmp/kestrel_profile/airootfs/etc/skel/.config/autostart
          mkdir -p /tmp/kestrel_profile/airootfs/etc/skel/.config/hypr
          
          cat << 'EOF' > /tmp/kestrel_profile/airootfs/etc/skel/.config/autostart/kestrel-welcome.desktop
          [Desktop Entry]
          Type=Application
          Exec=/usr/local/bin/kestrel-welcome.sh
          Hidden=false
          NoDisplay=false
          X-GNOME-Autostart-enabled=true
          Name=Kestrel Welcome
          EOF
          
          echo "exec-once = bash /usr/local/bin/kestrel-welcome.sh" > /tmp/kestrel_profile/airootfs/etc/skel/.config/hypr/hyprland.conf

          # 4. Copy the offline cache
          mkdir -p /tmp/kestrel_profile/airootfs/opt
          cp -r airootfs/opt/offline_cache /tmp/kestrel_profile/airootfs/opt/

          mkdir -p out/
          mkarchiso -v -w /tmp/archiso-tmp -o out/ /tmp/kestrel_profile/

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kestrel-Arch-ISO
          path: out/*.iso
