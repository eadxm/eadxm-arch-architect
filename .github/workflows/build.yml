name: Build Eadxm Architect ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-archiso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          # Use a global CDN mirror to prevent random timeout failures
          echo 'Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch' > /etc/pacman.d/mirrorlist

          # Update the keyring FIRST to prevent PGP signature CI crashes
          pacman -Sy --noconfirm archlinux-keyring

          # Safely update the system and install archiso build tools.
          # NOTE: the awk package is called "gawk" on Arch (there is no
          # package literally named "awk"). squashfs-tools and
          # pacman-contrib are added because mkarchiso needs mksquashfs
          # (releng's default image format) and repo-add (used below)
          # respectively -- neither is pulled in automatically.
          pacman -Su --noconfirm
          pacman -S --noconfirm archiso wget gawk mtools dosfstools erofs-utils squashfs-tools pacman-contrib

      - name: Prepare Offline Package Cache & Dependencies
        run: |
          # Create the cache directory inside the ISO structure
          mkdir -p airootfs/opt/offline_cache

          # Create the 'local' subfolder so pacman doesn't crash
          mkdir -p /tmp/empty_db/local

          # Setup Chaotic AUR in the GitHub Runner so it can download the packages
          pacman-key --init
          pacman-key --recv-key 3056513887B78AEB --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key 3056513887B78AEB
          pacman -U 'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-keyring.pkg.tar.zst' 'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-mirrorlist.pkg.tar.zst' --noconfirm
          echo -e "\n[chaotic-aur]\nInclude = /etc/pacman.d/chaotic-mirrorlist" >> /etc/pacman.conf

          # Download ALL possible packages and their dependencies into the cache folder.
          # This list is for the TARGET install only (what install.sh's offline
          # pacstrap call needs) -- it is intentionally NOT the live ISO's own
          # packages.x86_64, which is handled separately below.
          pacman -Syw --cachedir airootfs/opt/offline_cache --dbpath /tmp/empty_db --noconfirm \
            base linux linux-firmware grub efibootmgr os-prober ntfs-3g networkmanager iwd bluez bluez-utils blueman \
            pipewire pipewire-pulse wireplumber brightnessctl flatpak xorg-server sddm sudo zram-generator earlyoom \
            reflector ttf-dejavu ttf-liberation noto-fonts noto-fonts-emoji curl chaotic-keyring chaotic-mirrorlist parted \
            amd-ucode intel-ucode nvidia nvidia-utils xf86-video-amdgpu intel-media-driver switcheroo-control \
            hyprland waybar kitty rofi xdg-desktop-portal-hyprland polkit-kde-agent thunar gvfs \
            plasma-desktop plasma-workspace plasma-nm power-profiles-daemon kscreen konsole dolphin ark kate spectacle discover packagekit-qt6 sddm-kcm \
            xfce4 xfce4-terminal xfce4-goodies \
            librewolf firefox brave-bin libreoffice-fresh qt5-wayland qt6-wayland

      - name: Index Offline Database
        run: |
          # Build the database on the server so it is instant during installation
          cd airootfs/opt/offline_cache
          repo-add eadxm-offline.db.tar.gz *.pkg.tar.zst

      - name: Build the ISO
        run: |
          # Start from Arch's own reference profile UNTOUCHED. This is what
          # keeps mkinitcpio-archiso, syslinux, grub, efibootmgr, memtest86+,
          # etc. in place -- the packages that actually let the ISO boot.
          # We only ADD to this profile below; we never blanket-overwrite
          # its packages.x86_64 / profiledef.sh / pacman.conf, because doing
          # that is what was silently dropping mkinitcpio-archiso before
          # (that package supplies the "archiso" mkinitcpio hook -- without
          # it, the initramfs has nothing that can find and mount the ISO,
          # which is exactly the "mounting '' on real root" failure).
          cp -r /usr/share/archiso/configs/releng /tmp/eadxm_profile

          # Add Chaotic AUR to the profile's OWN build-time pacman.conf.
          # mkarchiso does not read /etc/pacman.conf for this -- it has its
          # own copy inside the profile.
          echo -e "\n[chaotic-aur]\nSigLevel = Optional TrustAll\nInclude = /etc/pacman.d/chaotic-mirrorlist" >> /tmp/eadxm_profile/pacman.conf

          # Add only what the LIVE environment itself needs, on top of
          # releng's already-complete list. zsh is required because
          # install.sh's error handler drops into /bin/zsh on failure.
          # Desktop/browser packages do NOT belong here -- those are
          # installed onto the TARGET disk later, from the offline cache,
          # by install.sh's own pacstrap call.
          echo "zsh" >> /tmp/eadxm_profile/packages.x86_64

          # Copy the installer into the live filesystem (airootfs/root/ on
          # the profile becomes /root/ on the booted ISO), stripping any
          # Windows line endings so bash doesn't choke on it, then mark it
          # executable.
          mkdir -p /tmp/eadxm_profile/airootfs/root
          sed 's/\r$//' install.sh > /tmp/eadxm_profile/airootfs/root/install.sh
          chmod +x /tmp/eadxm_profile/airootfs/root/install.sh

          # Copy the pre-built offline package cache into the live
          # filesystem too (airootfs/opt/ -> /opt/ on the booted ISO),
          # matching install.sh's ISO_CACHE="/opt/offline_cache".
          mkdir -p /tmp/eadxm_profile/airootfs/opt
          cp -r airootfs/opt/offline_cache /tmp/eadxm_profile/airootfs/opt/

          mkdir -p out/
          mkarchiso -v -w /tmp/archiso-tmp -o out/ /tmp/eadxm_profile/

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Eadxm-Arch-Architect-ISO
          path: out/*.iso
