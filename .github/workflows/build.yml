name: Bake Eadxm Arch ISO
on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged 

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Initialize System & Install Archiso
        run: |
          # Initialize the Arch keyring to prevent PGP signature failures in Docker
          pacman-key --init
          pacman-key --populate archlinux

          # Ensure the host container has multilib active to avoid installation conflicts
          sed -i '/\[multilib\]/,+1 s/^#//' /etc/pacman.conf || true
          
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso git dos2unix

      - name: Set Up Custom Profile Architecture
        run: |
          # Copy the stock Arch template profile
          cp -r /usr/share/archiso/configs/releng/ ./build_profile
          
          # Read the working host pacman.conf, strip comments out, and make sure extra and multilib are fully active
          sed -i '/\[extra\]/,+1 s/^#//' ./build_profile/pacman.conf || true
          sed -i '/\[multilib\]/,+1 s/^#//' ./build_profile/pacman.conf || true
          
          # Scrub invisible Windows formatting from the package list
          dos2unix packages.x86_64
          
          # DYNAMIC PATCH 1: Swap 'nvidia' to 'nvidia-open' in the package list
          sed -i 's/^nvidia[[:space:]]*$/nvidia-open/g' packages.x86_64
          
          # Append your target package tree to the profile
          cat packages.x86_64 >> ./build_profile/packages.x86_64
          
          # Inject your automated configuration scripts and services
          cp -r airootfs/* ./build_profile/airootfs/
          
          # Scrub invisible Windows formatting from your installer script and zlogin hook
          dos2unix ./build_profile/airootfs/usr/local/bin/auto-install.sh
          dos2unix ./build_profile/airootfs/root/.zlogin || true
          
          # DYNAMIC PATCH 2: Swap the package name inside the Auto-Install script
          sed -i 's/ nvidia nvidia-utils/ nvidia-open nvidia-utils/g' ./build_profile/airootfs/usr/local/bin/auto-install.sh
          
          # Grant absolute execution privileges to the script and the login hook
          chmod +x ./build_profile/airootfs/usr/local/bin/auto-install.sh
          chmod +x ./build_profile/airootfs/root/.zlogin || true

          # PATCH: Mask the time-sync service to completely neutralize the 15-minute Live USB boot hang
          ln -sf /dev/null ./build_profile/airootfs/etc/systemd/system/systemd-time-wait-sync.service

          # PATCH: Fix USB Descriptor error (-110 / -71) by injecting USB timing parameters into all ISO bootloaders
          sed -i 's/archisobasedir/usbcore.old_scheme_first=1 usbcore.initial_descriptor_timeout=5000 archisobasedir/g' ./build_profile/syslinux/*.cfg || true
          sed -i 's/archisobasedir/usbcore.old_scheme_first=1 usbcore.initial_descriptor_timeout=5000 archisobasedir/g' ./build_profile/efiboot/loader/entries/*.conf || true
          sed -i 's/archisobasedir/usbcore.old_scheme_first=1 usbcore.initial_descriptor_timeout=5000 archisobasedir/g' ./build_profile/grub/grub.cfg || true

      - name: Compile Custom ISO Image
        run: |
          mkdir -p ./output
          mkarchiso -v -w /tmp/archiso-workspace -o ./output ./build_profile

      - name: Upload Finished Bootable ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Eadxm-Arch-Architect-ISO
          path: ./output/*.iso
          retention-days: 7
